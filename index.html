<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dim Sum Temperature Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family: Arial;
margin:40px;
}

h1{
text-align:center;
}

#controls{
margin-bottom:20px;
}

button{
padding:8px 14px;
margin-left:5px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

</style>
</head>

<body>

<h1>Dim Sum Temperature Dashboard</h1>

<div id="controls">

Batch ID:
<input id="batchID" type="text">

<button onclick="startBatch()">Start Batch</button>
<button onclick="stopBatch()">Stop Batch</button>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<canvas id="tempChart"></canvas>

<table id="tempTable">
<thead>
<tr>
<th>Time</th>
<th>Steam Temp (°C)</th>
<th>Dim Sum Temp (°C)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

/* ==========================
FIREBASE CONFIG
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBJYBNVCNXHlaCl5wakhohU6aED5ZZXzhk",
  authDomain: "dim-sum-temperature-monitoring.firebaseapp.com",
  projectId: "dim-sum-temperature-monitoring",
  storageBucket: "dim-sum-temperature-monitoring.firebasestorage.app",
  messagingSenderId: "1014513307897",
  appId: "1:1014513307897:web:dbf077e9f085b8823d1228",
  measurementId: "G-1JV1ZW47KX"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
========================== */

const firebaseConfig = {

apiKey: "PASTE_HERE",
authDomain: "PASTE_HERE",
projectId: "PASTE_HERE",
storageBucket: "PASTE_HERE",
messagingSenderId: "PASTE_HERE",
appId: "PASTE_HERE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


/* ==========================
GLOBAL VARIABLES
========================== */

let batchActive=false;
let currentBatchID="";
let startTime;

let times=[];
let steamTemps=[];
let dimsumTemps=[];


/* ==========================
CHART SETUP
========================== */

const ctx=document.getElementById('tempChart').getContext('2d');

const chart=new Chart(ctx,{
type:'line',
data:{
labels:times,
datasets:[
{
label:'Steam Temp',
data:steamTemps,
borderWidth:2
},
{
label:'Dim Sum Temp',
data:dimsumTemps,
borderWidth:2
}
]
},
options:{
scales:{
x:{
ticks:{
maxRotation:90,
minRotation:90
}
},
y:{
title:{
display:true,
text:'Temperature °C'
}
}
}
}
});


/* ==========================
MQTT CONNECTION
========================== */

const client=mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect',function(){

console.log("MQTT connected");

client.subscribe("dimsum/temperature");

});


client.on('message',function(topic,message){

if(!batchActive)return;

const data=JSON.parse(message.toString());

const steam=parseFloat(data.steam).toFixed(3);
const dimsum=parseFloat(data.dimsum).toFixed(3);

const elapsed=Math.floor((Date.now()-startTime)/1000);

const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
const s=String(elapsed%60).padStart(2,'0');

const time=`${h}:${m}:${s}`;

times.push(time);
steamTemps.push(steam);
dimsumTemps.push(dimsum);

chart.update();

const row=document.createElement("tr");

row.innerHTML=`<td>${time}</td><td>${steam}</td><td>${dimsum}</td>`;

document.querySelector("#tempTable tbody").appendChild(row);


/* SAVE TO FIREBASE */

db.collection("batches")
.doc(currentBatchID)
.collection("readings")
.add({

time:time,
steam:parseFloat(steam),
dimsum:parseFloat(dimsum),
timestamp:new Date()

});

});


/* ==========================
START BATCH
========================== */

async function startBatch(){

const batchID=document.getElementById("batchID").value.trim();

if(!batchID){
alert("Enter Batch ID");
return;
}

const doc=await db.collection("batches").doc(batchID).get();

if(doc.exists){

alert("Batch ID already exists!");

return;

}

currentBatchID=batchID;

batchActive=true;

startTime=Date.now();

times=[];
steamTemps=[];
dimsumTemps=[];

chart.data.labels=times;
chart.data.datasets[0].data=steamTemps;
chart.data.datasets[1].data=dimsumTemps;

chart.update();

document.querySelector("#tempTable tbody").innerHTML="";

}


/* ==========================
STOP BATCH
========================== */

function stopBatch(){

batchActive=false;

alert("Batch saved to website");

}


/* ==========================
EXCEL DOWNLOAD
========================== */

function downloadExcel(){

let data=[["Time","Steam Temp","Dim Sum Temp"]];

for(let i=0;i<times.length;i++){

data.push([times[i],steamTemps[i],dimsumTemps[i]]);

}

const ws=XLSX.utils.aoa_to_sheet(data);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,currentBatchID);

XLSX.writeFile(wb,currentBatchID+".xlsx");

}

</script>

</body>
</html>
