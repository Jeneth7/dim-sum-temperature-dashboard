<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dim Sum Temperature Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
margin:30px;
background:#f5f5f5;
}

h1{
text-align:center;
}

#controls{
margin-bottom:20px;
text-align:center;
}

button{
padding:8px 14px;
margin-left:5px;
cursor:pointer;
}

input{
padding:6px;
}

.dashboard{
display:flex;
gap:30px;
align-items:flex-start;
}

/* TABLE PANEL */

.tablePanel{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
width:50%;
max-height:500px;
overflow-y:auto;
}

table{
border-collapse:collapse;
width:100%;
}

th{
background:#0077b6;
color:white;
padding:8px;
}

td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

/* GRAPH PANEL */

.chartPanel{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
width:50%;
}

canvas{
width:100%;
height:400px;
}

</style>
</head>

<body>

<h1>Dim Sum Temperature Monitoring</h1>

<div id="controls">

Batch ID:
<input id="batchID">

<button onclick="startBatch()">Start Batch</button>
<button onclick="stopBatch()">Stop Batch</button>
<button onclick="downloadExcel()">Download Excel</button>

</div>


<div class="dashboard">

<div class="tablePanel">

<table id="tempTable">

<thead>
<tr>
<th>Time</th>
<th>Steam Temperature (°C)</th>
<th>Dim Sum Temperature (°C)</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<div class="chartPanel">

<canvas id="tempChart"></canvas>

</div>

</div>


<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyBJYBNVCNXHlaCl5wakhohU6aED5ZZXzhk",
authDomain:"dim-sum-temperature-monitoring.firebaseapp.com",
projectId:"dim-sum-temperature-monitoring",
storageBucket:"dim-sum-temperature-monitoring.firebasestorage.app",
messagingSenderId:"1:1014513307897:web:dbf077e9f085b8823d1228",
appId:"G-1JV1ZW47KX"

};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();


let batchActive=false;
let currentBatchID="";
let startTime;

let times=[];
let steamTemps=[];
let dimsumTemps=[];


/* CHART */

const ctx=document.getElementById("tempChart");

const chart=new Chart(ctx,{

type:"line",

data:{
labels:times,
datasets:[

{
label:"Steam Temperature",
data:steamTemps,
borderWidth:2
},

{
label:"Dim Sum Temperature",
data:dimsumTemps,
borderWidth:2
}

]
},

options:{
responsive:true,
scales:{
x:{
ticks:{
maxRotation:90,
minRotation:90
}
},
y:{
title:{
display:true,
text:"Temperature °C"
}
}
}
}

});


/* MQTT */

const client=mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

client.on("connect",function(){

console.log("MQTT connected");

client.subscribe("dimsum/temperature");

});


client.on("message",function(topic,message){

if(!batchActive)return;

const data=JSON.parse(message.toString());

const steam=parseFloat(data.steam).toFixed(3);
const dimsum=parseFloat(data.dimsum).toFixed(3);

const elapsed=Math.floor((Date.now()-startTime)/1000);

const h=String(Math.floor(elapsed/3600)).padStart(2,"0");
const m=String(Math.floor((elapsed%3600)/60)).padStart(2,"0");
const s=String(elapsed%60).padStart(2,"0");

const time=`${h}:${m}:${s}`;

times.push(time);
steamTemps.push(steam);
dimsumTemps.push(dimsum);

chart.update();


const row=document.createElement("tr");

row.innerHTML=`<td>${time}</td><td>${steam}</td><td>${dimsum}</td>`;

document.querySelector("#tempTable tbody").appendChild(row);


/* SAVE TO FIREBASE */

db.collection("batches")
.doc(currentBatchID)
.collection("readings")
.add({

time:time,
steam:parseFloat(steam),
dimsum:parseFloat(dimsum),
timestamp:new Date()

});

});


async function startBatch(){

const batchID=document.getElementById("batchID").value.trim();

if(!batchID){

alert("Enter Batch ID");
return;

}

const doc=await db.collection("batches").doc(batchID).get();

if(doc.exists){

alert("Batch ID already exists");
return;

}

currentBatchID=batchID;

batchActive=true;

startTime=Date.now();

times=[];
steamTemps=[];
dimsumTemps=[];

chart.data.labels=times;
chart.data.datasets[0].data=steamTemps;
chart.data.datasets[1].data=dimsumTemps;

chart.update();

document.querySelector("#tempTable tbody").innerHTML="";

}


function stopBatch(){

batchActive=false;

alert("Batch saved");

}


/* EXCEL DOWNLOAD */

function downloadExcel(){

let data=[["Time","Steam Temperature","Dim Sum Temperature"]];

for(let i=0;i<times.length;i++){

data.push([times[i],steamTemps[i],dimsumTemps[i]]);

}

const ws=XLSX.utils.aoa_to_sheet(data);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,currentBatchID);

XLSX.writeFile(wb,currentBatchID+".xlsx");

}

</script>

</body>
</html>
