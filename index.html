<!DOCTYPE html>
<html>
<head>
    <title>Dim Sum Temperature Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- MQTT Websocket -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <!-- Excel Export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }
        .container { display: flex; justify-content: space-between; }
        .window { width: 48%; border: 1px solid black; padding: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; }
        canvas { margin-top: 10px; }
        button { margin-top: 20px; padding: 10px; }
        #batchControls { margin-top: 20px; }

        /* Login styling */
        #loginBox {
            text-align:center;
            margin-top:100px;
        }
        #loginBox input { padding: 5px; width:200px; margin-bottom:10px; }
        #loginBox button { padding: 5px 20px; }
    </style>
</head>

<body>

<!-- Login Screen -->
<div id="loginBox">
    <h2>Temperature Dashboard Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- Dashboard (hidden until login) -->
<div id="dashboard" style="display:none;">

<h1>Automated Dim Sum Temperature Monitoring</h1>

<div class="container">

    <!-- Steam Window -->
    <div class="window">
        <h2>Steam Temperature</h2>
        <table id="steamTable">
            <tr>
                <th>Time</th>
                <th>Temperature (°C)</th>
            </tr>
        </table>
        <canvas id="steamChart"></canvas>
    </div>

    <!-- Dim Sum Window -->
    <div class="window">
        <h2>Dim Sum Temperature</h2>
        <table id="dimsumTable">
            <tr>
                <th>Time</th>
                <th>Temperature (°C)</th>
            </tr>
        </table>
        <canvas id="dimsumChart"></canvas>
    </div>

</div>

<div id="batchControls">
    <label>Batch ID: <input type="text" id="batchID" placeholder="e.g., DS240326-01"></label>
    <button onclick="startBatch()">Start Batch</button>
    <button onclick="stopBatch()">Stop Batch</button>
    <button onclick="downloadExcel()">Download Excel</button>
</div>

</div>

<script>
let steamData = [];
let dimsumData = [];
let timeLabels = [];
let currentBatchID = '';
let batchActive = false;

// ---------------------- LOGIN FUNCTION ----------------------
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "smh" && pass === "dimsum987") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Incorrect username or password";
    }
}

// ---------------------- TIME FUNCTION ----------------------
function getCurrentTime() {
    let now = new Date();
    return now.toLocaleTimeString('en-GB');
}

// ---------------------- CHARTS ----------------------
let steamChart = new Chart(document.getElementById('steamChart'), {
    type: 'line',
    data: { labels: timeLabels, datasets:[{label:'Steam Temperature (°C)', data:steamData, borderColor:'red', fill:false, tension:0.1}] },
    options: { scales:{ x:{title:{display:true,text:'Time'}}, y:{title:{display:true,text:'Temperature (°C)'}} } }
});

let dimsumChart = new Chart(document.getElementById('dimsumChart'), {
    type: 'line',
    data: { labels: timeLabels, datasets:[{label:'Dim Sum Temperature (°C)', data:dimsumData, borderColor:'blue', fill:false, tension:0.1}] },
    options: { scales:{ x:{title:{display:true,text:'Time'}}, y:{title:{display:true,text:'Temperature (°C)'}} } }
});

// ---------------------- MQTT SETUP ----------------------
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

client.on('connect', () => {
    console.log("Connected to MQTT Broker");
    client.subscribe("dimsumfactory/steamcabinet/temperature");
});

client.on('message', (topic, message) => {
    if (!batchActive) return; // ignore if batch not running
    try {
        let data = JSON.parse(message.toString());
        let time = getCurrentTime();
        let steamTemp = parseFloat(data.steam_temp).toFixed(3);
        let dimsumTemp = parseFloat(data.dimsum_temp).toFixed(3);

        timeLabels.push(time);
        steamData.push(steamTemp);
        dimsumData.push(dimsumTemp);

        // Update tables
        let steamRow = document.getElementById("steamTable").insertRow();
        steamRow.insertCell(0).innerHTML = time;
        steamRow.insertCell(1).innerHTML = steamTemp;

        let dimsumRow = document.getElementById("dimsumTable").insertRow();
        dimsumRow.insertCell(0).innerHTML = time;
        dimsumRow.insertCell(1).innerHTML = dimsumTemp;

        // Update charts
        steamChart.update();
        dimsumChart.update();
    } catch(e) { console.error("Invalid message:", e); }
});

// ---------------------- BATCH CONTROLS ----------------------
function startBatch() {
    currentBatchID = document.getElementById('batchID').value.trim();
    if (!currentBatchID) { alert("Please enter a Batch ID."); return; }
    batchActive = true;
    timeLabels = []; steamData = []; dimsumData = [];

    // Clear tables
    document.getElementById("steamTable").innerHTML = '<tr><th>Time</th><th>Temperature (°C)</th></tr>';
    document.getElementById("dimsumTable").innerHTML = '<tr><th>Time</th><th>Temperature (°C)</th></tr>';

    steamChart.data.labels = timeLabels; steamChart.data.datasets[0].data = steamData; steamChart.update();
    dimsumChart.data.labels = timeLabels; dimsumChart.data.datasets[0].data = dimsumData; dimsumChart.update();

    alert(`Batch ${currentBatchID} started!`);
}

function stopBatch() {
    if (!batchActive) return;
    batchActive = false;
    alert(`Batch ${currentBatchID} stopped! You can now download the Excel file.`);
}

function downloadExcel() {
    if (!currentBatchID) { alert("Please start a batch first."); return; }
    let data = [];
    for (let i = 0; i < timeLabels.length; i++) {
        data.push({
            Batch: currentBatchID,
            Time: timeLabels[i],
            Steam_Temperature: steamData[i],
            DimSum_Temperature: dimsumData[i]
        });
    }
    let worksheet = XLSX.utils.json_to_sheet(data);
    let workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Temperature Data");
    XLSX.writeFile(workbook, `DimSum_${currentBatchID}_Temperature.xlsx`);
}
</script>

</body>
</html>
